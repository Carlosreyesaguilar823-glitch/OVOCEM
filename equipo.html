<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OVOCEM | Nuestro Equipo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#000000;
    --surface:rgba(255,255,255,0.03);
    --surface-hover:rgba(255,255,255,0.06);

    --border:rgba(255,255,255,0.08);
    --border-hover:rgba(255,255,255,0.18);

    --green:#10B981;
    --green-soft:rgba(16,185,129,0.08);

    --white:#FFFFFF;
    --gray:#86868B;

    --radius:28px;

    --transition:cubic-bezier(0.16,1,0.3,1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
    background:var(--bg);
}

body{
    background:var(--bg);
    color:var(--white);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    position:relative;
}

/* ========================================= */
/* BACKGROUND                                */
/* ========================================= */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size:42px 42px;
    z-index:0;
    pointer-events:none;
}

.ambient{
    position:fixed;
    border-radius:50%;
    filter:blur(160px);
    pointer-events:none;
    z-index:0;
}

.ambient.one{
    width:500px;
    height:500px;
    top:-140px;
    left:10%;
    background:radial-gradient(circle,var(--green-soft) 0%, transparent 70%);
}

.ambient.two{
    width:600px;
    height:600px;
    bottom:-100px;
    right:-120px;
    background:radial-gradient(circle,rgba(16,185,129,0.06) 0%, transparent 70%);
}

/* ========================================= */
/* NAVBAR                                    */
/* ========================================= */

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:100;
    padding:24px 20px;
}

.nav{
    max-width:1100px;
    margin:auto;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 26px;

    background:rgba(10,10,10,0.55);
    border:1px solid var(--border);

    border-radius:999px;

    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);

    transition:all .4s ease;

    position:relative;
}

.nav:hover{
    border-color:rgba(255,255,255,0.16);
}

.logo{
    text-decoration:none;
    color:var(--white);

    font-size:14px;
    font-weight:700;

    letter-spacing:0.3em;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:30px;
}

.nav-links a{
    text-decoration:none;
    color:var(--gray);

    font-size:13px;
    font-weight:500;

    transition:.3s ease;
}

.nav-links a:hover{
    color:var(--white);
}

.nav-links a.active{
    color:var(--green);
}

/* ========================================= */
/* MOBILE MENU                               */
/* ========================================= */

.menu-toggle{
    display:none;

    width:46px;
    height:46px;

    border-radius:50%;

    border:1px solid rgba(255,255,255,0.08);

    background:rgba(255,255,255,0.03);

    cursor:pointer;

    align-items:center;
    justify-content:center;
    flex-direction:column;

    gap:5px;

    transition:.3s ease;
}

.menu-toggle:hover{
    background:rgba(255,255,255,0.08);
}

.menu-toggle span{
    width:20px;
    height:2px;
    background:white;
    border-radius:999px;
    transition:.3s ease;
}

.mobile-menu{
    position:absolute;

    top:85px;
    left:0;
    width:100%;

    background:rgba(10,10,10,0.96);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:28px;

    padding:20px;

    display:flex;
    flex-direction:column;
    gap:18px;

    opacity:0;
    visibility:hidden;

    transform:translateY(-10px);

    transition:.35s ease;

    backdrop-filter:blur(30px);
}

.mobile-menu.active{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

.mobile-menu a{
    color:white;
    text-decoration:none;

    font-size:16px;
    font-weight:600;

    padding:14px 10px;

    border-bottom:1px solid rgba(255,255,255,0.05);
}

.mobile-menu a:last-child{
    border-bottom:none;
}

.mobile-menu a.active{
    color:var(--green);
}

/* ========================================= */
/* HERO                                      */
/* ========================================= */

.hero{
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    text-align:center;

    padding:180px 24px 100px;

    position:relative;
    z-index:1;
}

.hero-eyebrow{
    color:var(--green);

    text-transform:uppercase;

    letter-spacing:0.3em;

    font-size:12px;
    font-weight:700;

    margin-bottom:24px;

    opacity:0;

    transform:translateY(20px);

    animation:heroFade 1s var(--transition) forwards;
}

.hero h1{
    font-size:clamp(48px,8vw,96px);

    line-height:0.95;

    font-weight:800;

    letter-spacing:-0.06em;

    margin-bottom:28px;

    opacity:0;

    transform:translateY(25px);

    animation:heroFade 1s var(--transition) forwards;
    animation-delay:.15s;
}

.hero h1 span{
    background:linear-gradient(180deg,#ffffff 10%, #9ca3af 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero-sub{
    max-width:760px;

    margin:auto;

    color:var(--gray);

    font-size:20px;

    line-height:1.6;

    font-weight:400;

    opacity:0;

    transform:translateY(25px);

    animation:heroFade 1s var(--transition) forwards;
    animation-delay:.3s;
}

@keyframes heroFade{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ========================================= */
/* SECTIONS                                  */
/* ========================================= */

.section{
    position:relative;
    z-index:1;

    max-width:1240px;

    margin:auto;

    padding:110px 24px;
}

.section-label{
    text-transform:uppercase;

    letter-spacing:0.3em;

    color:var(--gray);

    font-size:12px;

    font-weight:700;

    margin-bottom:14px;
}

.section-title{
    font-size:clamp(34px,5vw,62px);

    line-height:1.02;

    letter-spacing:-0.05em;

    font-weight:800;

    margin-bottom:70px;
}

/* ========================================= */
/* DIRECTOR CARD                             */
/* ========================================= */

.org-wrapper{
    width:100%;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.director-card{
    width:100%;
    max-width:420px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.05) 0%,
        rgba(255,255,255,0.015) 100%
    );

    border:1px solid rgba(16,185,129,0.15);

    border-radius:36px;

    padding:48px;

    text-align:center;

    backdrop-filter:blur(18px);

    transition:all .7s var(--transition);

    position:relative;

    overflow:hidden;
}

.director-card::before{
    content:"";

    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at top right,
    rgba(16,185,129,0.08),
    transparent 50%);

    opacity:0;

    transition:opacity .6s ease;
}

.director-card:hover{
    transform:translateY(-10px);

    border-color:rgba(16,185,129,0.4);

    box-shadow:
    0 30px 80px rgba(0,0,0,0.7),
    0 0 60px rgba(16,185,129,0.08);
}

.director-card:hover::before{
    opacity:1;
}

/* ========================================= */
/* PHOTO                                     */
/* ========================================= */

.photo-wrap{
    width:120px;
    height:120px;

    margin:auto auto 24px;

    position:relative;
}

.member-photo{
    width:100%;
    height:100%;

    border-radius:50%;

    overflow:hidden;

    background:#161616;

    border:1px solid rgba(255,255,255,0.12);

    position:relative;

    z-index:2;
}

.member-photo img{
    width:100%;
    height:100%;

    object-fit:cover;

    transition:transform .6s ease, filter .6s ease;

    filter:grayscale(20%);
}

.team-card:hover img,
.director-card:hover img{
    transform:scale(1.05);
    filter:grayscale(0%);
}

.avatar-fallback{
    width:100%;
    height:100%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(135deg,#232323,#111111);

    font-size:28px;
    font-weight:700;
}

.member-name{
    font-size:22px;
    font-weight:700;

    letter-spacing:-0.03em;

    margin-bottom:8px;
}

.member-role{
    color:var(--green);

    font-size:11px;
    font-weight:700;

    text-transform:uppercase;

    letter-spacing:0.2em;

    margin-bottom:8px;
}

.member-dept{
    color:var(--gray);

    font-size:14px;
}

/* ========================================= */
/* TREE CONNECTOR                            */
/* ========================================= */

.tree{
    width:100%;
    max-width:900px;
    margin:18px 0 26px;
}

.tree line{
    stroke:rgba(255,255,255,0.08);
    stroke-width:1.3;
}

.tree circle{
    fill:var(--green);
}

/* ========================================= */
/* TEAM GRID                                 */
/* ========================================= */

.team-grid{
    width:100%;

    display:grid;
    grid-template-columns:repeat(4,1fr);

    gap:22px;
}

.team-card{
    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.01)
    );

    border:1px solid var(--border);

    border-radius:32px;

    padding:40px 26px;

    text-align:center;

    transition:all .7s var(--transition);

    backdrop-filter:blur(14px);

    position:relative;

    overflow:hidden;
}

.team-card::before{
    content:"";

    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at top left,
    rgba(255,255,255,0.04),
    transparent 50%);

    opacity:0;

    transition:opacity .5s ease;
}

.team-card:hover{
    transform:translateY(-8px);

    border-color:var(--border-hover);

    background:rgba(255,255,255,0.05);

    box-shadow:0 25px 60px rgba(0,0,0,0.55);
}

.team-card:hover::before{
    opacity:1;
}

/* ========================================= */
/* PHILOSOPHY                                */
/* ========================================= */

.philosophy{
    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.04),
        rgba(255,255,255,0.015)
    );

    border:1px solid var(--border);

    border-radius:42px;

    padding:70px 80px;

    backdrop-filter:blur(16px);
}

.philosophy h2{
    font-size:clamp(30px,4vw,52px);

    line-height:1.1;

    letter-spacing:-0.05em;

    margin-bottom:26px;
}

.philosophy p{
    color:var(--gray);

    font-size:18px;

    line-height:1.7;

    max-width:900px;
}

/* ========================================= */
/* SPECS                                     */
/* ========================================= */

.spec-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:18px;
}

.spec-card{
    background:var(--surface);

    border:1px solid var(--border);

    border-radius:24px;

    padding:34px 24px;

    transition:all .5s var(--transition);

    text-align:center;
}

.spec-card:hover{
    transform:translateY(-6px);

    background:var(--surface-hover);

    border-color:var(--border-hover);
}

.spec-icon{
    width:54px;
    height:54px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    margin:0 auto 20px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.08);

    font-size:22px;
}

.spec-card h3{
    font-size:15px;
    margin-bottom:6px;
}

.spec-card p{
    font-size:13px;
    color:var(--gray);
}

/* ========================================= */
/* STATS                                     */
/* ========================================= */

.stats-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:22px;
}

.stat-card{
    background:var(--surface);

    border:1px solid var(--border);

    border-radius:30px;

    padding:42px 28px;

    transition:.5s ease;
}

.stat-card:hover{
    transform:translateY(-6px);

    border-color:var(--border-hover);

    background:var(--surface-hover);
}

.stat-num{
    font-size:64px;

    line-height:1;

    font-weight:800;

    letter-spacing:-0.06em;

    margin-bottom:10px;
}

.stat-label{
    color:var(--gray);

    font-size:14px;
}

/* ========================================= */
/* VALUES                                    */
/* ========================================= */

.values-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
}

.value-card{
    background:var(--surface);

    border:1px solid var(--border);

    border-radius:22px;

    padding:26px;

    font-size:15px;

    font-weight:600;

    transition:all .4s ease;
}

.value-card:hover{
    background:var(--surface-hover);

    border-color:var(--border-hover);

    transform:scale(1.02);
}

/* ========================================= */
/* CTA                                       */
/* ========================================= */

.cta{
    text-align:center;

    padding:170px 24px;

    position:relative;
    z-index:1;
}

.cta h2{
    font-size:clamp(42px,6vw,82px);

    line-height:0.95;

    letter-spacing:-0.06em;

    margin-bottom:24px;
}

.cta p{
    color:var(--gray);

    font-size:20px;

    margin-bottom:40px;
}

.btn{
    display:inline-flex;
    align-items:center;
    gap:10px;

    padding:16px 32px;

    border-radius:999px;

    background:var(--white);

    color:#000;

    text-decoration:none;

    font-weight:700;

    transition:all .5s var(--transition);
}

.btn:hover{
    transform:scale(1.03);

    background:#f3f3f3;
}

/* ========================================= */
/* FOOTER                                    */
/* ========================================= */

footer{
    position:relative;
    z-index:1;

    border-top:1px solid rgba(255,255,255,0.06);

    padding:40px 24px;
}

.footer-inner{
    max-width:1240px;

    margin:auto;

    display:flex;
    justify-content:space-between;
    align-items:center;

    gap:20px;
}

.footer-logo{
    color:var(--white);

    text-decoration:none;

    font-size:14px;
    font-weight:700;

    letter-spacing:0.2em;
}

.footer-inner p{
    color:var(--gray);

    font-size:13px;
}

/* ========================================= */
/* REVEAL                                    */
/* ========================================= */

.reveal{
    opacity:0;

    transform:translateY(40px) scale(.98);

    filter:blur(8px);

    transition:
    opacity 1s var(--transition),
    transform 1s var(--transition),
    filter 1s var(--transition);
}

.reveal.active{
    opacity:1;

    transform:translateY(0) scale(1);

    filter:blur(0);
}

.delay-1{ transition-delay:.1s; }
.delay-2{ transition-delay:.2s; }
.delay-3{ transition-delay:.3s; }
.delay-4{ transition-delay:.4s; }

/* ========================================= */
/* RESPONSIVE                                */
/* ========================================= */

@media(max-width:1100px){

    .team-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .spec-grid{
        grid-template-columns:repeat(3,1fr);
    }

    .values-grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:768px){

    header{
        padding:18px 14px;
    }

    .nav{
        padding:14px 18px;
    }

    .nav-links{
        display:none;
    }

    .menu-toggle{
        display:flex;
    }

    .section{
        padding:80px 24px;
    }

    .hero{
        padding-top:160px;
    }

    .hero-sub{
        font-size:18px;
    }

    .team-grid,
    .spec-grid,
    .stats-grid,
    .values-grid{
        grid-template-columns:1fr;
    }

    .philosophy{
        padding:42px 28px;
    }

    .tree{
        display:none;
    }

    .footer-inner{
        flex-direction:column;
        text-align:center;
    }
}

</style>
</head>

<body>

<div class="ambient one"></div>
<div class="ambient two"></div>

<!-- NAVBAR                                 -->

    <nav class="nav">

        <button class="menu-toggle" id="menuToggle">

        </button>

        <!-- MENÚ MOBILE -->

        <div class="mobile-menu" id="mobileMenu">

            <a href="historia.html">Historia</a>
            <a href="tecnologia.html">Tecnología</a>
            <a href="equipo.html" class="active">Equipo</a>

        </div>

    </nav>

</header>

<!-- ====================================== -->

        </div>

        <h1>
            Las personas<br>
            detrás de <span>OVOCEM</span>
        </h1>

        <p class="hero-sub">

        </p>

    </div>

</section>

<!-- ====================================== -->
<!-- SCRIPT                                 -->
<!-- ====================================== -->

<script>

const revealElements = document.querySelectorAll('.reveal');

const revealOnScroll = () => {

    const triggerBottom = window.innerHeight * 0.88;

    revealElements.forEach(element => {

        const top = element.getBoundingClientRect().top;

        if(top < triggerBottom){
            element.classList.add('active');
        }

    });

};

window.addEventListener('scroll', revealOnScroll);

window.addEventListener('load', revealOnScroll);

/* ========================= */
/* MOBILE MENU               */
/* ========================= */

const menuToggle = document.getElementById('menuToggle');
const mobileMenu = document.getElementById('mobileMenu');

menuToggle.addEventListener('click', () => {

    mobileMenu.classList.toggle('active');

});

</script>

</body>
